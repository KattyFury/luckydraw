<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>LuckyDraw</title>
  <meta name="description" content="LuckyDraw — vòng quay may rủi" />
  <meta name="theme-color" content="#07070f" />
  <meta name="application-name" content="LuckyDraw" />
  <link rel="icon" href="spin.png?v=5" type="image/png" sizes="any" />
  <link rel="icon" href="spin.png?v=5" type="image/png" sizes="32x32" />
  <link rel="icon" href="spin.png?v=5" type="image/png" sizes="192x192" />
  <link rel="shortcut icon" href="spin.png?v=5" type="image/png" />
  <link rel="apple-touch-icon" href="spin.png?v=5" sizes="180x180" />
  <link rel="apple-touch-icon" href="spin.png?v=5" sizes="512x512" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LuckyDraw" />
  <link rel="manifest" href="manifest.webmanifest?v=5" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07070f;
      --bg-gradient: radial-gradient(ellipse at 50% 0%, #1a1035 0%, #07070f 70%);
      --neon-cyan: #00f0ff;
      --neon-pink: #ff2d95;
      --neon-purple: #b14cff;
      --neon-yellow: #ffe600;
      --neon-green: #39ff14;
      --neon-orange: #ff6b00;
      --neon-red: #ff003c;
      --neon-blue: #00a2ff;
      --text-primary: #ffffff;
      --text-secondary: #a0a0c0;
      --glass: rgba(15, 15, 30, 0.82);
      --glass-border: rgba(0, 240, 255, 0.28);
      --glow-cyan: 0 0 20px #00f0ff, 0 0 40px #00f0ff66;
      --glow-pink: 0 0 20px #ff2d95, 0 0 40px #ff2d9566;
      --glow-button: 0 0 30px #00f0ffaa, 0 8px 25px #00f0ff44;
      --font: 'Inter', system-ui, -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
    }

    .app {
      width: 100%;
      max-width: 100%;
      height: 100%;
      height: 100dvh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      background-image: var(--bg-gradient);
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* ── Top bar ── */
    .top-bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 8px;
      min-height: 52px;
      z-index: 5;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 0 16px #00f0ff55, 0 0 2px #00f0ffaa;
      border: 1px solid rgba(0, 240, 255, 0.35);
    }

    .brand-name {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #fff;
      text-shadow: 0 0 18px #00f0ff88;
    }

    .edit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(0, 240, 255, 0.55);
      background: rgba(0, 240, 255, 0.15);
      border-radius: 999px;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--neon-cyan);
      box-shadow: 0 0 14px #00f0ff44;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .12s, opacity .15s, box-shadow .15s;
    }
    .edit-btn:active { transform: scale(0.96); }

    /* ── Wheel zone (~55–60%) ── */
    .wheel-zone {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 24px;
      position: relative;
    }

    .wheel-wrap {
      position: relative;
      width: min(100%, 100%);
      height: auto;
      aspect-ratio: 1;
      max-height: 100%;
      margin: auto;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      filter: drop-shadow(0 0 18px rgba(0, 240, 255, 0.22));
    }
    .wheel-wrap.spinning { cursor: wait; }
    .wheel-wrap:active:not(.spinning) { transform: scale(0.985); }

    #wheel {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: transparent;
    }

    /* Droplet pointer — bottom-left */
    .pointer {
      position: absolute;
      left: 5%;
      bottom: 9%;
      width: 48px;
      height: 66px;
      z-index: 20;
      pointer-events: none;
      transform: rotate(48deg) translateY(10px);
      transform-origin: 50% 18%;
      filter: drop-shadow(0 0 10px #ff003ccc) drop-shadow(0 0 22px #ff003c88);
    }
    @media (min-width: 400px) {
      .pointer { width: 54px; height: 74px; left: 6%; bottom: 10%; }
    }

    /* ── Spin CTA ── */
    .spin-zone {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px 14px;
      z-index: 4;
    }

    .spin-btn {
      width: min(70%, 320px);
      height: 68px;
      border: none;
      border-radius: 20px;
      font-family: inherit;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(180deg, #00f0ff 0%, #0080ff 100%);
      box-shadow: var(--glow-button);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: transform .12s, opacity .15s, box-shadow .15s;
      text-shadow: 0 1px 2px rgba(0, 0, 40, 0.35);
    }
    .spin-btn:active:not(:disabled) { transform: scale(0.96); }
    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: 0 0 12px #00f0ff44;
    }

    /* ── Bottom tabs ── */
    .tab-bar {
      flex: 0 0 auto;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      width: 100%;
      min-height: 56px;
      background: rgba(5, 5, 14, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(0, 240, 255, 0.18);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 6;
    }

    .tab-btn {
      flex: 1 1 0;
      min-width: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      font-family: inherit;
      font-weight: 700;
      font-size: clamp(0.68rem, 2.6vw, 0.82rem);
      color: var(--text-secondary);
      cursor: pointer;
      padding: 12px 2px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      touch-action: manipulation;
      transition: color .15s;
    }
    .tab-btn.active {
      color: var(--neon-pink);
      text-shadow: 0 0 12px #ff2d95aa;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: 12%;
      right: 12%;
      height: 3px;
      border-radius: 0 0 3px 3px;
      background: var(--neon-pink);
      box-shadow: 0 0 10px #ff2d95, 0 0 18px #ff2d9588;
    }

    /* ── Modals ── */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .result-modal {
      animation: fadeIn .25s ease both;
    }
    .result-card {
      animation: popIn .45s cubic-bezier(.2, 1.25, .4, 1) both;
      width: min(92vw, 400px);
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      border-radius: 28px;
      box-shadow: 0 0 40px #00f0ff33, 0 20px 50px rgba(0, 0, 0, 0.55);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    .result-label {
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--neon-cyan);
      text-shadow: 0 0 12px #00f0ff88;
    }
    .result-text {
      margin-top: 1rem;
      font-size: clamp(1.75rem, 7vw, 2.25rem);
      font-weight: 900;
      line-height: 1.15;
      color: #fff;
      word-break: break-word;
      padding: 0 4px;
    }
    .result-sub {
      margin-top: 0.75rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--neon-yellow);
      text-shadow: 0 0 14px #ffe60088;
    }
    .btn-ok {
      margin-top: 1.75rem;
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      background: var(--neon-pink);
      box-shadow: var(--glow-pink);
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn-ok:active { transform: scale(0.98); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.82) translateY(18px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Edit modal */
    .edit-sheet {
      width: 100%;
      max-width: 28rem;
      max-height: 90dvh;
      overflow-y: auto;
      border-radius: 24px;
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      box-shadow: 0 0 40px #00f0ff22, 0 24px 60px rgba(0, 0, 0, 0.6);
    }
    .edit-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0, 240, 255, 0.15);
      background: rgba(10, 10, 22, 0.95);
      backdrop-filter: blur(10px);
    }
    .edit-header h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
    }
    .edit-header p {
      margin: 4px 0 0;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--neon-cyan);
    }
    .btn-ghost {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-ghost:active { background: rgba(255, 255, 255, 0.06); }

    .edit-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .field-label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .count-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .count-btn {
      height: 40px;
      width: 40px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .15s, color .15s, box-shadow .15s, border-color .15s;
      border: 1.5px solid rgba(160, 160, 192, 0.25);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-secondary);
    }
    .count-btn.active {
      border-color: transparent;
      background: var(--neon-cyan);
      color: #041018;
      box-shadow: 0 0 16px #00f0ff88;
    }

    .seg-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .seg-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .seg-num {
      width: 20px;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-secondary);
    }
    .seg-swatch {
      height: 32px;
      width: 32px;
      flex-shrink: 0;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
      border: 1.5px solid rgba(255, 255, 255, 0.25);
    }
    .seg-input {
      width: 100%;
      border-radius: 12px;
      border: 1.5px solid rgba(0, 240, 255, 0.2);
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: #fff;
      outline: none;
    }
    .seg-input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.2);
    }
    .seg-input::placeholder { color: #666688; }

    .edit-footer {
      position: sticky;
      bottom: 0;
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid rgba(0, 240, 255, 0.15);
      background: rgba(10, 10, 22, 0.96);
    }
    .btn-cancel {
      flex: 1;
      border-radius: 14px;
      border: 1.5px solid rgba(160, 160, 192, 0.35);
      background: transparent;
      padding: 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .btn-save {
      flex: 1;
      border-radius: 14px;
      border: none;
      background: var(--neon-cyan);
      padding: 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 800;
      color: #041018;
      box-shadow: 0 0 20px #00f0ff66;
      cursor: pointer;
    }
    .btn-cancel:active, .btn-save:active { transform: scale(0.98); }

    .hidden { display: none !important; }
    .flex { display: flex !important; }
    .fixed { position: fixed; }
    .inset-0 { inset: 0; }
    .z-50 { z-index: 50; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .p-4 { padding: 1rem; }
    .p-5 { padding: 1.25rem; }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="brand">
        <img class="brand-icon" src="spin.png?v=5" width="36" height="36" alt="" />
        <span class="brand-name">LuckyDraw</span>
      </div>
      <button id="btnEdit" type="button" class="edit-btn" title="Chỉnh sửa vòng quay">Edit</button>
    </header>

    <section class="wheel-zone">
      <div class="wheel-wrap" id="wheelBox" role="button" tabindex="0" aria-label="Chạm để quay">
        <div class="pointer" aria-hidden="true">
          <svg viewBox="0 0 42 58" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 4 C21 4 4 24 4 34 C4 44.5 11.5 52 21 52 C30.5 52 38 44.5 38 34 C38 24 21 4 21 4 Z"
                  fill="#1a0508" stroke="#ff003c" stroke-width="1.2"/>
            <ellipse cx="21" cy="36" rx="9.5" ry="10.5" fill="#ff003c"/>
            <ellipse cx="18" cy="32" rx="3" ry="2.2" fill="#ff7a9a" opacity=".65"/>
          </svg>
        </div>
        <canvas id="wheel"></canvas>
      </div>
    </section>

    <div class="spin-zone">
      <button id="btnSpin" type="button" class="spin-btn">SPIN</button>
    </div>

    <nav class="tab-bar" id="tabBar" role="tablist" aria-label="Chế độ vòng quay"></nav>
  </div>

  <!-- Result modal -->
  <div id="resultModal" class="result-modal fixed inset-0 z-50 hidden items-center justify-center p-5 modal-backdrop" role="dialog" aria-modal="true">
    <div class="result-card">
      <p class="result-label">Kết quả</p>
      <p id="resultText" class="result-text"></p>
      <p class="result-sub">1 2 3 dzô</p>
      <button id="btnCloseResult" type="button" class="btn-ok">OK</button>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" role="dialog" aria-modal="true">
    <div class="edit-sheet">
      <div class="edit-header">
        <div>
          <h2>Chỉnh sửa vòng quay</h2>
          <p id="editTabLabel">Tab hiện tại</p>
        </div>
        <button id="btnCloseEdit" type="button" class="btn-ghost" aria-label="Đóng">Đóng</button>
      </div>

      <div class="edit-body">
        <div>
          <label class="field-label">Số ô (3 → 9)</label>
          <div class="count-picker" id="countPicker"></div>
        </div>
        <div>
          <label class="field-label">Nội dung từng ô</label>
          <div class="seg-list" id="segList"></div>
        </div>
      </div>

      <div class="edit-footer">
        <button id="btnCancelEdit" type="button" class="btn-cancel">Hủy</button>
        <button id="btnSaveEdit" type="button" class="btn-save">Lưu</button>
      </div>
    </div>
  </div>

  <script>
    // ─── Constants ───────────────────────────────────────────
    const STORAGE_KEY = 'luckydraw_v3';
    // 9 màu neon — max 9 ô
    const COLORS = [
      '#00a2ff', // blue
      '#ff003c', // red
      '#b14cff', // purple
      '#ffe600', // yellow
      '#39ff14', // green
      '#ff6b00', // orange
      '#ff2d95', // pink
      '#00f0ff', // cyan
      '#7c3aed', // deep violet (9th)
    ];

    function colorsForCount(n) {
      const base = COLORS.slice(0, Math.min(n, COLORS.length));
      if (n <= COLORS.length) {
        if (n > 2 && base[0] === base[n - 1]) {
          const mid = base.splice(1, 1)[0];
          base.push(mid);
        }
        return base;
      }
      return Array.from({ length: n }, (_, i) => COLORS[i % COLORS.length]);
    }

    // Pointer tip on rim: bottom-left ≈ 135° (3π/4)
    const POINTER_ANGLE = (3 * Math.PI) / 4;

    const TAB_IDS = ['an-nhau', 'custom1', 'custom2', 'custom3'];
    const TAB_LABELS = {
      'an-nhau': 'Ăn nhậu',
      'custom1': 'Custom 1',
      'custom2': 'Custom 2',
      'custom3': 'Custom 3',
    };
    const DEFAULT_AN_NHAU = [
      'Uống 1 ly',
      'Bên trái uống',
      'Bên phải uống',
      'Đối diện uống',
      'Chọn 1 người uống cùng',
      'Miễn lượt',
      'Đồng khởi',
    ];
    const DEFAULT_CUSTOM = ['Mục 1', 'Mục 2', 'Mục 3', 'Mục 4'];

    // ─── State ───────────────────────────────────────────────
    let state = loadState();
    let rotation = 0;
    let spinning = false;
    let editDraft = null;

    // ─── DOM ─────────────────────────────────────────────────
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const tabBar = document.getElementById('tabBar');
    const btnSpin = document.getElementById('btnSpin');
    const btnEdit = document.getElementById('btnEdit');
    const resultModal = document.getElementById('resultModal');
    const resultText = document.getElementById('resultText');
    const btnCloseResult = document.getElementById('btnCloseResult');
    const editModal = document.getElementById('editModal');
    const editTabLabel = document.getElementById('editTabLabel');
    const countPicker = document.getElementById('countPicker');
    const segList = document.getElementById('segList');
    const btnCloseEdit = document.getElementById('btnCloseEdit');
    const btnCancelEdit = document.getElementById('btnCancelEdit');
    const btnSaveEdit = document.getElementById('btnSaveEdit');
    const wheelBox = document.getElementById('wheelBox');

    // ─── Persistence ─────────────────────────────────────────
    function defaultState() {
      return {
        activeTab: 'an-nhau',
        tabs: {
          'an-nhau': { labels: [...DEFAULT_AN_NHAU] },
          'custom1': { labels: [...DEFAULT_CUSTOM] },
          'custom2': { labels: [...DEFAULT_CUSTOM] },
          'custom3': { labels: [...DEFAULT_CUSTOM] },
        },
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        const base = defaultState();
        if (parsed.activeTab && base.tabs[parsed.activeTab]) {
          base.activeTab = parsed.activeTab;
        }
        if (parsed.tabs) {
          for (const id of TAB_IDS) {
            if (parsed.tabs[id]?.labels?.length) {
              const labels = parsed.tabs[id].labels
                .map((s) => String(s).trim())
                .filter(Boolean)
                .slice(0, 9);
              if (labels.length >= 3) base.tabs[id].labels = labels;
            }
          }
        }
        return base;
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function currentLabels() {
      return state.tabs[state.activeTab].labels;
    }

    // ─── Tabs UI ─────────────────────────────────────────────
    function renderTabs() {
      tabBar.innerHTML = '';
      for (const id of TAB_IDS) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.role = 'tab';
        btn.className = 'tab-btn' + (id === state.activeTab ? ' active' : '');
        btn.textContent = TAB_LABELS[id];
        btn.setAttribute('aria-selected', id === state.activeTab ? 'true' : 'false');
        btn.addEventListener('click', () => {
          if (spinning || id === state.activeTab) return;
          state.activeTab = id;
          saveState();
          rotation = 0;
          hideResult();
          renderTabs();
          drawWheel();
        });
        tabBar.appendChild(btn);
      }
    }

    // ─── Canvas wheel ────────────────────────────────────────
    function resizeCanvas() {
      const parent = wheelBox.parentElement;
      let size = 0;
      if (parent) {
        const pw = parent.clientWidth - 48; // padding 24×2
        const ph = parent.clientHeight - 8;
        size = Math.max(0, Math.floor(Math.min(pw, ph)));
        if (size > 0) {
          wheelBox.style.width = size + 'px';
          wheelBox.style.height = size + 'px';
        }
      }
      if (!size) return;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(size * dpr);
      canvas.height = Math.round(size * dpr);
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawWheel();
    }

    function drawWheel() {
      const labels = currentLabels();
      const n = labels.length;
      const size = wheelBox.clientWidth;
      if (!size) return;
      const cx = size / 2;
      const cy = size / 2;
      const radius = size / 2;
      const arc = (Math.PI * 2) / n;
      const palette = colorsForCount(n);

      ctx.clearRect(0, 0, size, size);

      // Soft circular glow under wheel (cheap — one blur)
      const shadowR = radius * 0.94;
      ctx.save();
      ctx.translate(cx, cy + Math.max(3, size * 0.012));
      ctx.beginPath();
      ctx.arc(0, 0, shadowR, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 240, 255, 0.18)';
      ctx.filter = 'blur(14px)';
      ctx.fill();
      ctx.filter = 'none';
      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      ctx.beginPath();
      ctx.arc(0, 0, radius - 0.5, 0, Math.PI * 2);
      ctx.clip();

      for (let i = 0; i < n; i++) {
        const start = i * arc - Math.PI / 2;
        const end = start + arc;
        const color = palette[i];

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        // thin light edge between segments
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        const mid = start + arc / 2;
        ctx.save();
        // +π: text reads rim → center (pointer on left)
        ctx.rotate(mid + Math.PI);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.shadowColor = 'rgba(0,0,0,0.55)';
        ctx.shadowBlur = 3;
        ctx.shadowOffsetY = 1;

        const text = labels[i];
        const maxW = radius * 0.56;
        const textX = -(radius - 14);
        let fontSize = n <= 5 ? 15 : n <= 7 ? 13 : 11;
        ctx.font = `800 ${fontSize}px Inter, system-ui, sans-serif`;
        while (ctx.measureText(text).width > maxW && fontSize > 9) {
          fontSize -= 1;
          ctx.font = `800 ${fontSize}px Inter, system-ui, sans-serif`;
        }
        if (ctx.measureText(text).width > maxW && text.includes(' ')) {
          const parts = splitLabel(text, ctx, maxW);
          const lineH = fontSize + 2;
          const startY = -((parts.length - 1) * lineH) / 2;
          parts.forEach((line, li) => {
            ctx.fillText(line, textX, startY + li * lineH);
          });
        } else {
          ctx.fillText(text, textX, 0);
        }
        ctx.restore();
      }

      // Outer rim highlight
      ctx.beginPath();
      ctx.arc(0, 0, radius - 1.5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Hub — black gloss + neon red core
      const hub = Math.max(12, size * 0.044);
      ctx.beginPath();
      ctx.arc(0, 0, hub, 0, Math.PI * 2);
      ctx.fillStyle = '#0a0a12';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,0,60,0.55)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, hub * 0.52, 0, Math.PI * 2);
      ctx.fillStyle = '#ff003c';
      ctx.shadowColor = '#ff003c';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.ellipse(-hub * 0.12, -hub * 0.14, hub * 0.18, hub * 0.12, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,140,160,0.55)';
      ctx.fill();

      ctx.restore();
    }

    function splitLabel(text, measureCtx, maxW) {
      const words = text.split(/\s+/);
      if (words.length < 2) return [text];
      let best = [text];
      let bestScore = Infinity;
      for (let i = 1; i < words.length; i++) {
        const a = words.slice(0, i).join(' ');
        const b = words.slice(i).join(' ');
        const wa = measureCtx.measureText(a).width;
        const wb = measureCtx.measureText(b).width;
        const score = Math.max(wa, wb);
        if (score < bestScore && wa <= maxW * 1.05 && wb <= maxW * 1.05) {
          bestScore = score;
          best = [a, b];
        }
      }
      return best;
    }

    // ─── Spin logic ──────────────────────────────────────────
    function getWinnerIndex(rot) {
      const n = currentLabels().length;
      const arc = (Math.PI * 2) / n;
      const r = ((rot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      let a = POINTER_ANGLE - r;
      let normalized = ((a + Math.PI / 2) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      return Math.floor(normalized / arc) % n;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function setSpinLabel(spinningNow) {
      btnSpin.textContent = spinningNow ? 'Đang quay...' : 'SPIN';
    }

    function spin() {
      if (spinning) return;
      const labels = currentLabels();
      if (!labels.length) return;

      hideResult();
      spinning = true;
      btnSpin.disabled = true;
      setSpinLabel(true);
      wheelBox.classList.add('spinning');

      const n = labels.length;
      const targetIndex = Math.floor(Math.random() * n);
      const arc = (Math.PI * 2) / n;

      const targetRotMod =
        ((POINTER_ANGLE + Math.PI / 2 - targetIndex * arc - arc / 2) % (Math.PI * 2) + Math.PI * 2) %
        (Math.PI * 2);

      // 5–6 full spins, ~4.5–5s
      const extraSpins = 5 + Math.floor(Math.random() * 2);
      const startRot = rotation;
      let delta = targetRotMod - (((startRot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2));
      delta = ((delta % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const endRot = startRot + delta + extraSpins * Math.PI * 2;

      const duration = 4500 + Math.random() * 500;
      const t0 = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - t0) / duration);
        rotation = startRot + (endRot - startRot) * easeOutCubic(t);
        drawWheel();
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = endRot;
          drawWheel();
          const winner = getWinnerIndex(rotation);
          showResult(labels[winner] ?? labels[targetIndex]);
          spinning = false;
          btnSpin.disabled = false;
          setSpinLabel(false);
          wheelBox.classList.remove('spinning');
        }
      }
      requestAnimationFrame(frame);
    }

    function showResult(text) {
      resultText.textContent = text;
      resultModal.classList.remove('hidden');
      resultModal.classList.add('flex');
      const card = resultModal.querySelector('.result-card');
      card.style.animation = 'none';
      void card.offsetWidth;
      card.style.animation = '';
    }

    function hideResult() {
      resultModal.classList.add('hidden');
      resultModal.classList.remove('flex');
    }

    // ─── Edit modal ──────────────────────────────────────────
    function openEdit() {
      if (spinning) return;
      editDraft = { labels: [...currentLabels()] };
      editTabLabel.textContent = 'Tab: ' + TAB_LABELS[state.activeTab];
      renderCountPicker();
      renderSegList();
      editModal.classList.remove('hidden');
      editModal.classList.add('flex');
    }

    function closeEdit() {
      editModal.classList.add('hidden');
      editModal.classList.remove('flex');
      editDraft = null;
    }

    function renderCountPicker() {
      countPicker.innerHTML = '';
      for (let c = 3; c <= 9; c++) {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = String(c);
        const active = editDraft.labels.length === c;
        b.className = 'count-btn' + (active ? ' active' : '');
        b.addEventListener('click', () => {
          syncDraftFromInputs();
          const cur = editDraft.labels;
          if (c > cur.length) {
            while (editDraft.labels.length < c) {
              editDraft.labels.push('Mục ' + (editDraft.labels.length + 1));
            }
          } else if (c < cur.length) {
            editDraft.labels = cur.slice(0, c);
          }
          renderCountPicker();
          renderSegList();
        });
        countPicker.appendChild(b);
      }
    }

    function renderSegList() {
      segList.innerHTML = '';
      editDraft.labels.forEach((label, i) => {
        const row = document.createElement('div');
        row.className = 'seg-row';

        const num = document.createElement('span');
        num.className = 'seg-num';
        num.textContent = String(i + 1);

        const color = colorsForCount(editDraft.labels.length)[i];
        const swatch = document.createElement('span');
        swatch.className = 'seg-swatch';
        swatch.style.background = color;
        swatch.style.color = color;

        const input = document.createElement('input');
        input.type = 'text';
        input.value = label;
        input.maxLength = 40;
        input.dataset.idx = String(i);
        input.className = 'seg-input';
        input.placeholder = 'Ô ' + (i + 1);

        row.appendChild(num);
        row.appendChild(swatch);
        row.appendChild(input);
        segList.appendChild(row);
      });
    }

    function syncDraftFromInputs() {
      if (!editDraft) return;
      segList.querySelectorAll('input').forEach((inp) => {
        const i = Number(inp.dataset.idx);
        editDraft.labels[i] = inp.value.trim() || ('Mục ' + (i + 1));
      });
    }

    function saveEdit() {
      syncDraftFromInputs();
      let labels = editDraft.labels.map((s) => s.trim()).filter(Boolean);
      if (labels.length < 3) {
        alert('Cần ít nhất 3 ô có nội dung.');
        return;
      }
      if (labels.length > 9) labels = labels.slice(0, 9);
      state.tabs[state.activeTab].labels = labels;
      saveState();
      closeEdit();
      rotation = 0;
      hideResult();
      drawWheel();
    }

    // ─── Events ──────────────────────────────────────────────
    btnSpin.addEventListener('click', spin);
    wheelBox.addEventListener('click', spin);
    wheelBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        spin();
      }
    });
    btnEdit.addEventListener('click', openEdit);
    btnCloseEdit.addEventListener('click', closeEdit);
    btnCancelEdit.addEventListener('click', closeEdit);
    btnSaveEdit.addEventListener('click', saveEdit);
    btnCloseResult.addEventListener('click', hideResult);
    resultModal.addEventListener('click', (e) => {
      if (e.target === resultModal) hideResult();
    });
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) closeEdit();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (!editModal.classList.contains('hidden')) closeEdit();
      else if (!resultModal.classList.contains('hidden')) hideResult();
    });
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 120));

    // ─── Init ────────────────────────────────────────────────
    renderTabs();
    requestAnimationFrame(() => {
      resizeCanvas();
      requestAnimationFrame(resizeCanvas);
    });
  </script>
</body>
</html>
