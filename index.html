<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>LuckyDraw</title>
  <meta name="description" content="LuckyDraw" />
  <meta name="theme-color" content="#2563EB" />
  <meta name="application-name" content="LuckyDraw" />
  <!-- Favicon (desktop) + Apple icon (thêm vào màn hình chính) -->
  <link rel="icon" href="spin.png?v=4" type="image/png" sizes="any" />
  <link rel="icon" href="spin.png?v=4" type="image/png" sizes="32x32" />
  <link rel="icon" href="spin.png?v=4" type="image/png" sizes="192x192" />
  <link rel="shortcut icon" href="spin.png?v=4" type="image/png" />
  <link rel="apple-touch-icon" href="spin.png?v=4" sizes="180x180" />
  <link rel="apple-touch-icon" href="spin.png?v=4" sizes="512x512" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="LuckyDraw" />
  <link rel="manifest" href="manifest.webmanifest?v=4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { barlow: ['Barlow', 'system-ui', 'sans-serif'] },

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      font-family: 'Barlow', system-ui, sans-serif;
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f5f9;
    }

    /*
      Mobile: full ngang (flexible 100%)
      10 hàng dọc bằng nhau (1fr × 10):
      1 Edit · 2 trống · 3–7 vòng xoay · 8–9 Spin (center) · 10 navbar
    */
    .app {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      /* 100dvh: full màn thật — tránh 100svh để hở khoảng dưới navbar */
      height: 100%;
      height: 100dvh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: repeat(10, minmax(0, 1fr));
      grid-template-columns: minmax(0, 1fr);
      overflow: hidden;
      /* Nền phẳng — tránh gradient trắng “che” hàng 8–9 */
      background: #f1f5f9;
      /* Chỉ top safe-area — nav full-bleed 2 bên + đáy (safe-area nằm trong .row-nav) */
      padding: env(safe-area-inset-top, 0px) 0 0 0;
    }

    /* Desktop/mobile: full viewport — không khóa width kiểu phone strip */

    /* Hàng 1 — Edit */
    .row-top {
      grid-row: 1 / 2;
      align-self: stretch;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 14px;
      min-height: 0;
      overflow: hidden;
    }
    .edit-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid #cbd5e1;
      background: #fff;
      border-radius: 14px;
      padding: 10px 18px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      color: #1e293b;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
      cursor: pointer;
      touch-action: manipulation;
    }
    .edit-btn:active { transform: scale(0.97); }

    /* Hàng 3–7 — vòng xoay */
    .row-wheel {
      grid-row: 3 / 8; /* rows 3,4,5,6,7 */
      align-self: stretch;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 0 12px;
      position: relative;
      overflow: hidden;
    }

    /* Hàng 8–9 — Spin (chính giữa 2 hàng), nền trong suốt */
    .row-spin {
      grid-row: 8 / 10; /* rows 8 + 9 */
      align-self: stretch;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 0 16px;
      overflow: visible;
      background: transparent;
      position: relative;
      z-index: 2;
    }

    /* Hàng 10 — navbar full mép (không hở lề) */
    .row-nav {
      grid-row: 10 / 11;
      align-self: stretch;
      justify-self: stretch;
      width: 100%;
      max-width: 100%;
      height: 100%;
      min-height: 0;
      max-height: none;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
      border-top: 1px solid rgba(15, 23, 42, 0.1);
      background: #ffffff;
      /* Nền trắng kéo sát đáy màn; nút tab nằm trên vùng safe-area */
      padding: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      margin: 0;
      position: relative;
      z-index: 3;
      box-sizing: border-box;
    }

    .wheel-wrap {
      position: relative;
      width: min(100%, 100%);
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1;
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
      filter: none;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      margin: auto;
      z-index: 1;
    }
    .wheel-wrap.spinning { cursor: wait; }
    .wheel-wrap:active:not(.spinning) { transform: scale(0.985); }
    #wheel {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
      filter: none;
    }

    /* Droplet pointer — bottom-left, tip chọt sâu vào trong vòng */
    .pointer {
      position: absolute;
      left: 6%;
      bottom: 10%;
      width: 48px;
      height: 66px;
      z-index: 20;
      pointer-events: none;
      transform: rotate(48deg) translateY(10px);
      transform-origin: 50% 18%;
      filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.35));
    }
    @media (min-width: 400px) {
      .pointer { width: 54px; height: 74px; left: 7%; bottom: 11%; }
    }

    .spin-btn {
      width: min(72%, 240px);
      height: 52px;
      flex-shrink: 0;
      margin: 0;
      border: none;
      border-radius: 16px;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.32);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .12s, opacity .15s;
      touch-action: manipulation;
    }
    .spin-btn:active:not(:disabled) { transform: scale(0.97); }
    .spin-btn:disabled { opacity: .6; cursor: not-allowed; }

    .tab-btn {
      flex: 1 1 0;
      height: auto;
      align-self: stretch;
      border: none;
      border-radius: 0;
      background: transparent;
      font-family: inherit;
      font-weight: 700;
      font-size: clamp(0.7rem, 2.8vw, 0.85rem);
      color: #64748b;
      cursor: pointer;
      padding: 0;
      margin: 0;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: color .15s, background .15s;
      touch-action: manipulation;
    }
    .tab-btn.active {
      color: #1d4ed8;
      background: linear-gradient(to top, rgba(37,99,235,.1), transparent);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 0;
      background: #2563eb;
    }

    .modal-backdrop {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    /* Result popup — to, chữ rõ */
    .result-modal {
      animation: fadeIn .25s ease both;
    }
    .result-card {
      animation: popIn .45s cubic-bezier(.2, 1.25, .4, 1) both;
      width: min(92vw, 400px);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.82) translateY(18px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .seg-row input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .2);
      border-color: #2563eb;
    }

  </style>
</head>
<body class="font-barlow text-slate-800 antialiased">
  <div class="app">
    <!-- Row 1: chỉ Edit -->
    <header class="row-top">
      <button id="btnEdit" type="button" class="edit-btn" title="Chỉnh sửa vòng quay">Edit</button>
    </header>

    <!-- Hàng 3–7: vòng xoay -->
    <section class="row-wheel">
      <div class="wheel-wrap" id="wheelBox" role="button" tabindex="0" aria-label="Chạm để quay">
        <!-- Droplet pointer bottom-left -->
        <div class="pointer" aria-hidden="true">
          <svg viewBox="0 0 42 58" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 4 C21 4 4 24 4 34 C4 44.5 11.5 52 21 52 C30.5 52 38 44.5 38 34 C38 24 21 4 21 4 Z"
                  fill="#0f0f0f"/>
            <ellipse cx="21" cy="36" rx="9.5" ry="10.5" fill="#ef2222"/>
            <ellipse cx="18" cy="32" rx="3" ry="2.2" fill="#ff7a7a" opacity=".55"/>
          </svg>
        </div>
        <canvas id="wheel"></canvas>
      </div>
    </section>

    <!-- Hàng 8–9: Spin center -->
    <div class="row-spin">
      <button id="btnSpin" type="button" class="spin-btn">Spin</button>

    <!-- Row 10: navbar -->
    <nav class="row-nav" id="tabBar" role="tablist" aria-label="Chế độ vòng quay"></nav>
  </div>

  <!-- Result popup (to, chữ rõ) -->
  <div id="resultModal" class="result-modal fixed inset-0 z-50 hidden items-center justify-center p-5 modal-backdrop" role="dialog" aria-modal="true">
    <div class="result-card rounded-3xl bg-white px-6 py-8 text-center shadow-2xl ring-1 ring-slate-200">

      <p class="mt-3 text-base font-semibold text-slate-500">1 2 3 dzô</p>
      <button
        id="btnCloseResult"
        type="button"

        OK
      </button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" role="dialog" aria-modal="true">
    <div class="w-full max-w-md max-h-[90dvh] overflow-y-auto rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200">
      <div class="sticky top-0 flex items-center justify-between border-b border-slate-100 bg-white/95 px-5 py-4 backdrop-blur z-10">
        <div>
          <h2 class="text-lg font-extrabold text-slate-900">Chỉnh sửa vòng quay</h2>
          <p class="text-xs font-medium text-slate-500" id="editTabLabel">Tab hiện tại</p>
        </div>
        <button id="btnCloseEdit" type="button" class="rounded-lg px-3 py-2 text-sm font-bold text-slate-500 hover:bg-slate-100" aria-label="Đóng">Đóng</button>
      </div>

      <div class="space-y-5 px-5 py-5">

          <label class="mb-2 block text-sm font-bold text-slate-700">Số ô (3 → 9)</label>
          <div class="flex flex-wrap gap-2" id="countPicker"></div>

        <div>

          Hủy
        </button>
        <button id="btnSaveEdit" type="button" class="flex-1 rounded-xl bg-blue-600 py-3 text-sm font-extrabold text-white shadow-md shadow-blue-500/25">
          Lưu
        </button>
      </div>
    </div>
  </div>

  <script>
    // ─── Constants ───────────────────────────────────────────
    const STORAGE_KEY = 'luckydraw_v3';
    // 9 màu riêng biệt — không lặp, không 2 xanh kề nhau
    // Xanh dương → Đỏ → Tím → Vàng → Xanh lá → Cam → Hồng → Nâu → Indigo
    const COLORS = [
      '#2563EB', // xanh dương
      '#EF4444', // đỏ
      '#A855F7', // tím
      '#EAB308', // vàng
      '#22C55E', // xanh lá
      '#F97316', // cam
      '#EC4899', // hồng
      '#A16207', // nâu vàng
      '#4F46E5', // indigo
    ];

    /** Lấy n màu không lặp; nếu first≈last thì xoay để tránh 2 màu giống kề mép */
    function colorsForCount(n) {
      const base = COLORS.slice(0, Math.min(n, COLORS.length));
      // max 9 ô = đủ 9 màu, không lặp
      if (n <= COLORS.length) {
        // đảm bảo ô đầu & ô cuối khác hẳn (tránh kề nhau trên vòng tròn)
        if (n > 2 && base[0] === base[n - 1]) {
          // không xảy ra với slice unique, nhưng phòng hờ
          const mid = base.splice(1, 1)[0];
          base.push(mid);
        }
        return base;
      }
      // fallback (không dùng vì max 9)
      return Array.from({ length: n }, (_, i) => COLORS[i % COLORS.length]);
    }
    // Pointer tip on rim: bottom-left ≈ 135° (3π/4) in canvas math coords
    // (0 = right, π/2 = bottom, π = left, -π/2 = top)
    const POINTER_ANGLE = (3 * Math.PI) / 4;

    const TAB_IDS = ['an-nhau', 'custom1', 'custom2', 'custom3'];
    const TAB_LABELS = {
      'an-nhau': 'Ăn nhậu',
      'custom1': 'Custom 1',
      'custom2': 'Custom 2',
      'custom3': 'Custom 3',
    };
    const DEFAULT_AN_NHAU = [
      'Uống 1 ly',
      'Bên trái uống',
      'Bên phải uống',
      'Đối diện uống',
      'Chọn 1 người uống cùng',
      'Miễn lượt',
      'Đồng khởi',
    ];
    const DEFAULT_CUSTOM = ['Mục 1', 'Mục 2', 'Mục 3', 'Mục 4'];

    // ─── State ───────────────────────────────────────────────
    let state = loadState();
    let rotation = 0;
    let spinning = false;
    let editDraft = null;

    // ─── DOM ─────────────────────────────────────────────────
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const tabBar = document.getElementById('tabBar');
    const btnSpin = document.getElementById('btnSpin');
    const btnEdit = document.getElementById('btnEdit');
    const resultModal = document.getElementById('resultModal');
    const resultText = document.getElementById('resultText');
    const btnCloseResult = document.getElementById('btnCloseResult');
    const editModal = document.getElementById('editModal');
    const editTabLabel = document.getElementById('editTabLabel');
    const countPicker = document.getElementById('countPicker');
    const segList = document.getElementById('segList');
    const btnCloseEdit = document.getElementById('btnCloseEdit');
    const btnCancelEdit = document.getElementById('btnCancelEdit');
    const btnSaveEdit = document.getElementById('btnSaveEdit');
    const wheelBox = document.getElementById('wheelBox');

    // ─── Persistence ─────────────────────────────────────────
    function defaultState() {
      return {
        activeTab: 'an-nhau',
        tabs: {
          'an-nhau': { labels: [...DEFAULT_AN_NHAU] },
          'custom1': { labels: [...DEFAULT_CUSTOM] },
          'custom2': { labels: [...DEFAULT_CUSTOM] },
          'custom3': { labels: [...DEFAULT_CUSTOM] },
        },
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        const base = defaultState();
        if (parsed.activeTab && base.tabs[parsed.activeTab]) {
          base.activeTab = parsed.activeTab;
        }
        if (parsed.tabs) {
          for (const id of TAB_IDS) {
            if (parsed.tabs[id]?.labels?.length) {
              const labels = parsed.tabs[id].labels
                .map((s) => String(s).trim())
                .filter(Boolean)
                .slice(0, 9);
              if (labels.length >= 3) base.tabs[id].labels = labels;
            }
          }
        }
        return base;
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function currentLabels() {
      return state.tabs[state.activeTab].labels;
    }

    // ─── Tabs UI ─────────────────────────────────────────────
    function renderTabs() {
      tabBar.innerHTML = '';
      for (const id of TAB_IDS) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.role = 'tab';
        btn.className = 'tab-btn' + (id === state.activeTab ? ' active' : '');
        btn.textContent = TAB_LABELS[id];
        btn.setAttribute('aria-selected', id === state.activeTab ? 'true' : 'false');
        btn.addEventListener('click', () => {
          if (spinning || id === state.activeTab) return;
          state.activeTab = id;
          saveState();
          rotation = 0;
          hideResult();
          renderTabs();
          drawWheel();
        });
        tabBar.appendChild(btn);
      }
    }

    // ─── Canvas wheel ────────────────────────────────────────
    function resizeCanvas() {
      const parent = wheelBox.parentElement;
      // Fit square into rows 3–7 zone
      let size = 0;
      if (parent) {
        const pw = parent.clientWidth - 24;
        const ph = parent.clientHeight;
        size = Math.max(0, Math.floor(Math.min(pw, ph)));
        if (size > 0) {
          wheelBox.style.width = size + 'px';
          wheelBox.style.height = size + 'px';
        }
      }
      if (!size) return;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(size * dpr);
      canvas.height = Math.round(size * dpr);
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawWheel();
    }

    function drawWheel() {
      const labels = currentLabels();
      const n = labels.length;
      const size = wheelBox.clientWidth;
      if (!size) return;
      const cx = size / 2;
      const cy = size / 2;
      // Full radius — không để mép vuông/trong suốt quanh bánh
      const radius = size / 2;
      const arc = (Math.PI * 2) / n;
      const palette = colorsForCount(n);

      ctx.clearRect(0, 0, size, size);

      // Bóng tròn vẽ bằng canvas (không CSS — tránh bóng vuông)
      // co radius bóng để không chạm 4 góc canvas
      const shadowR = radius * 0.96;
      ctx.save();
      ctx.translate(cx, cy + Math.max(4, size * 0.018));
      ctx.beginPath();
      ctx.arc(0, 0, shadowR, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(15, 23, 42, 0.22)';
      ctx.filter = 'blur(12px)';
      ctx.fill();
      ctx.filter = 'none';
      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      // Clip tròn — mép bánh sạch
      ctx.beginPath();
      ctx.arc(0, 0, radius - 0.5, 0, Math.PI * 2);
      ctx.clip();

      for (let i = 0; i < n; i++) {
        const start = i * arc - Math.PI / 2;
        const end = start + arc;
        const color = palette[i];

        // Ô màu — không viền, không line trắng
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        const mid = start + arc / 2;
        ctx.save();
        // +π: chữ đọc từ mép ngoài → tâm (dễ đọc khi pointer bên trái)
        ctx.rotate(mid + Math.PI);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.shadowColor = 'rgba(0,0,0,0.28)';
        ctx.shadowBlur = 2;
        ctx.shadowOffsetY = 1;

        const text = labels[i];
        const maxW = radius * 0.56;
        // Sau khi +π: mép ngoài nằm ở x âm
        const textX = -(radius - 14);
        let fontSize = n <= 5 ? 15 : n <= 7 ? 13 : 11;
        ctx.font = `800 ${fontSize}px Barlow, system-ui, sans-serif`;
        while (ctx.measureText(text).width > maxW && fontSize > 9) {
          fontSize -= 1;
          ctx.font = `800 ${fontSize}px Barlow, system-ui, sans-serif`;
        }
        if (ctx.measureText(text).width > maxW && text.includes(' ')) {
          const parts = splitLabel(text, ctx, maxW);
          const lineH = fontSize + 2;
          const startY = -((parts.length - 1) * lineH) / 2;
          parts.forEach((line, li) => {
            ctx.fillText(line, textX, startY + li * lineH);
          });
        } else {
          ctx.fillText(text, textX, 0);
        }
        ctx.restore();
      }

      // Chốt giữa — đen + đỏ (đồng bộ pointer giọt nước)
      const hub = Math.max(11, size * 0.042);
      ctx.beginPath();
      ctx.arc(0, 0, hub, 0, Math.PI * 2);
      ctx.fillStyle = '#0f0f0f';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, 0, hub * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = '#ef2222';
      ctx.fill();
      // highlight nhẹ giống pointer
      ctx.beginPath();
      ctx.ellipse(-hub * 0.12, -hub * 0.14, hub * 0.18, hub * 0.12, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,122,122,0.45)';
      ctx.fill();

      ctx.restore();
    }

    function splitLabel(text, measureCtx, maxW) {
      const words = text.split(/\s+/);
      if (words.length < 2) return [text];
      let best = [text];
      let bestScore = Infinity;
      for (let i = 1; i < words.length; i++) {
        const a = words.slice(0, i).join(' ');
        const b = words.slice(i).join(' ');
        const wa = measureCtx.measureText(a).width;
        const wb = measureCtx.measureText(b).width;
        const score = Math.max(wa, wb);
        if (score < bestScore && wa <= maxW * 1.05 && wb <= maxW * 1.05) {
          bestScore = score;
          best = [a, b];
        }
      }
      return best;
    }

    // ─── Spin logic (pointer = bottom-left) ──────────────────
    // Segment i unrotated center (math angle): i*arc - PI/2 + arc/2
    // After +rotation R, center on screen: that + R
    // Want center under POINTER_ANGLE:
    //   i*arc - PI/2 + arc/2 + R ≡ POINTER_ANGLE  (mod 2π)
    //   R ≡ POINTER_ANGLE + PI/2 - i*arc - arc/2

    function getWinnerIndex(rot) {
      const n = currentLabels().length;
      const arc = (Math.PI * 2) / n;
      const r = ((rot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      // Absolute angle on unrotated wheel under the pointer
      // screenAngle = wheelAngle + r  =>  wheelAngle = POINTER_ANGLE - r
      // Map to segment index where segments start at -PI/2 and go CCW
      let a = POINTER_ANGLE - r;
      // relative to top (-PI/2): add PI/2
      let normalized = ((a + Math.PI / 2) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      return Math.floor(normalized / arc) % n;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function spin() {
      if (spinning) return;
      const labels = currentLabels();
      if (!labels.length) return;

      hideResult();
      spinning = true;
      btnSpin.disabled = true;
      wheelBox.classList.add('spinning');

      const n = labels.length;
      const targetIndex = Math.floor(Math.random() * n);
      const arc = (Math.PI * 2) / n;

      // Land so center of targetIndex sits under POINTER_ANGLE
      const targetRotMod =
        ((POINTER_ANGLE + Math.PI / 2 - targetIndex * arc - arc / 2) % (Math.PI * 2) + Math.PI * 2) %
        (Math.PI * 2);

      const extraSpins = 4 + Math.floor(Math.random() * 3);
      const startRot = rotation;
      let delta = targetRotMod - (((startRot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2));
      delta = ((delta % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const endRot = startRot + delta + extraSpins * Math.PI * 2;

      const duration = 4200 + Math.random() * 800;
      const t0 = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - t0) / duration);
        rotation = startRot + (endRot - startRot) * easeOutCubic(t);
        drawWheel();
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = endRot;
          drawWheel();
          const winner = getWinnerIndex(rotation);
          showResult(labels[winner] ?? labels[targetIndex]);
          spinning = false;
          btnSpin.disabled = false;
          wheelBox.classList.remove('spinning');
        }
      }
      requestAnimationFrame(frame);
    }

    function showResult(text) {
      resultText.textContent = text;
      resultModal.classList.remove('hidden');
      resultModal.classList.add('flex');
      const card = resultModal.querySelector('.result-card');
      card.style.animation = 'none';
      void card.offsetWidth;
      card.style.animation = '';
    }

    function hideResult() {
      resultModal.classList.add('hidden');
      resultModal.classList.remove('flex');
    }

    // ─── Edit modal ──────────────────────────────────────────
    function openEdit() {
      if (spinning) return;
      editDraft = { labels: [...currentLabels()] };
      editTabLabel.textContent = 'Tab: ' + TAB_LABELS[state.activeTab];
      renderCountPicker();
      renderSegList();
      editModal.classList.remove('hidden');
      editModal.classList.add('flex');
    }

    function closeEdit() {
      editModal.classList.add('hidden');
      editModal.classList.remove('flex');
      editDraft = null;
    }

    function renderCountPicker() {
      countPicker.innerHTML = '';
      for (let c = 3; c <= 9; c++) {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = String(c);
        const active = editDraft.labels.length === c;
        b.className =
          'h-10 w-10 rounded-xl text-sm font-extrabold transition ' +
          (active
            ? 'bg-blue-600 text-white shadow-md shadow-blue-500/30'
            : 'border border-slate-200 bg-white text-slate-600');
        b.addEventListener('click', () => {
          syncDraftFromInputs();
          const cur = editDraft.labels;
          if (c > cur.length) {
            while (editDraft.labels.length < c) {
              editDraft.labels.push('Mục ' + (editDraft.labels.length + 1));
            }
          } else if (c < cur.length) {
            editDraft.labels = cur.slice(0, c);
          }
          renderCountPicker();
          renderSegList();
        });
        countPicker.appendChild(b);
      }
    }

    function renderSegList() {
      segList.innerHTML = '';
      editDraft.labels.forEach((label, i) => {
        const row = document.createElement('div');
        row.className = 'seg-row flex items-center gap-2';
        const swatch = document.createElement('span');
        swatch.className = 'h-8 w-8 shrink-0 rounded-lg ring-1 ring-black/5';
        swatch.style.background = colorsForCount(editDraft.labels.length)[i];
        const input = document.createElement('input');
        input.type = 'text';
        input.value = label;
        input.maxLength = 40;
        input.dataset.idx = String(i);
        input.className =
          'w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-800';
        input.placeholder = 'Ô ' + (i + 1);
        const num = document.createElement('span');
        num.className = 'w-5 text-center text-xs font-bold text-slate-400';
        num.textContent = String(i + 1);
        row.appendChild(num);
        row.appendChild(swatch);
        row.appendChild(input);
        segList.appendChild(row);
      });
    }

    function syncDraftFromInputs() {
      if (!editDraft) return;
      segList.querySelectorAll('input').forEach((inp) => {
        const i = Number(inp.dataset.idx);
        editDraft.labels[i] = inp.value.trim() || ('Mục ' + (i + 1));
      });
    }

    function saveEdit() {
      syncDraftFromInputs();
      let labels = editDraft.labels.map((s) => s.trim()).filter(Boolean);
      if (labels.length < 3) {
        alert('Cần ít nhất 3 ô có nội dung.');
        return;
      }
      if (labels.length > 9) labels = labels.slice(0, 9);
      state.tabs[state.activeTab].labels = labels;
      saveState();
      closeEdit();
      rotation = 0;
      hideResult();
      drawWheel();
    }

    // ─── Events ──────────────────────────────────────────────
    btnSpin.addEventListener('click', spin);
    wheelBox.addEventListener('click', spin);
    wheelBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        spin();
      }
    });
    btnEdit.addEventListener('click', openEdit);
    btnCloseEdit.addEventListener('click', closeEdit);
    btnCancelEdit.addEventListener('click', closeEdit);
    btnSaveEdit.addEventListener('click', saveEdit);
    btnCloseResult.addEventListener('click', hideResult);
    resultModal.addEventListener('click', (e) => {
      if (e.target === resultModal) hideResult();
    });
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) closeEdit();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (!editModal.classList.contains('hidden')) closeEdit();
      else if (!resultModal.classList.contains('hidden')) hideResult();
    });
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 120));

    // ─── Init ────────────────────────────────────────────────
    renderTabs();
    // Wait a frame so grid sizes resolve on mobile
    requestAnimationFrame(() => {
      resizeCanvas();
      requestAnimationFrame(resizeCanvas);
    });
  </script>
</body>
</html>
