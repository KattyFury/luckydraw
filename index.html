<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>luckydraw — Vòng Quay Ăn Nhậu</title>
  <meta name="description" content="Vòng quay ngẫu nhiên vui nhộn cho tiệc ăn nhậu / party. Mở là chơi ngay." />
  <meta name="theme-color" content="#2563EB" />
  <link rel="icon" type="image/png" href="spin.png" />
  <link rel="apple-touch-icon" href="spin.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { barlow: ['Barlow', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    html, body { font-family: 'Barlow', system-ui, sans-serif; }
    body {
      background: radial-gradient(ellipse at top, #f0f7ff 0%, #fafafa 45%, #fff 100%);
      min-height: 100dvh;
    }
    .tab-btn {
      transition: color .15s, border-color .15s, background .15s;
    }
    .tab-btn.active {
      color: #1d4ed8;
      border-bottom-color: #2563eb;
      background: linear-gradient(to bottom, transparent, rgba(37,99,235,.06));
    }
    .wheel-wrap {
      filter: drop-shadow(0 18px 28px rgba(15, 23, 42, 0.18));
    }
    /* Droplet pointer — black + red, pointing down into the wheel */
    .pointer {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 42px;
      height: 58px;
      z-index: 20;
      pointer-events: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.35));
    }
    .spin-btn:active:not(:disabled) { transform: scale(0.97); }
    .spin-btn:disabled { opacity: .65; cursor: not-allowed; }
    .modal-backdrop {
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(4px);
    }
    .result-pop {
      animation: resultIn .45s cubic-bezier(.2,1.2,.4,1) both;
    }
    @keyframes resultIn {
      from { opacity: 0; transform: translateY(12px) scale(.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .seg-row input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37,99,235,.2);
      border-color: #2563eb;
    }
  </style>
</head>
<body class="font-barlow text-slate-800 antialiased">
  <!-- Navbar -->
  <header class="sticky top-0 z-30 border-b border-slate-200/80 bg-white/90 backdrop-blur-md">
    <div class="mx-auto flex max-w-3xl items-center justify-between gap-3 px-4 py-3">
      <div class="flex items-center gap-2.5 min-w-0">
        <img src="spin.png" alt="" class="h-9 w-9 rounded-full object-cover shadow-sm ring-1 ring-slate-200" />
        <div class="min-w-0">
          <h1 class="text-lg font-extrabold tracking-tight text-slate-900 leading-none">luckydraw</h1>
          <p class="text-[11px] font-medium text-slate-500 truncate">Vòng quay party · mở là chơi</p>
        </div>
      </div>
      <button
        id="btnEdit"
        type="button"
        class="inline-flex items-center gap-1.5 rounded-xl border border-slate-200 bg-white px-3.5 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 hover:border-slate-300 active:scale-[.98] transition"
        title="Chỉnh sửa vòng quay"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-.707.464l-3.535 1.178a.5.5 0 01-.632-.632l1.178-3.535a2 2 0 01.464-.707z" />
        </svg>
        Edit
      </button>
    </div>
    <!-- Tabs -->
    <nav class="mx-auto flex max-w-3xl gap-0 overflow-x-auto px-2" id="tabBar" role="tablist">
      <!-- filled by JS -->
    </nav>
  </header>

  <main class="mx-auto flex max-w-3xl flex-col items-center px-4 pb-16 pt-8">
    <!-- Wheel -->
    <div class="relative wheel-wrap" id="wheelBox" style="width: min(92vw, 420px); height: min(92vw, 420px);">
      <!-- Droplet pointer (top) -->
      <div class="pointer" aria-hidden="true">
        <svg viewBox="0 0 42 58" width="42" height="58" xmlns="http://www.w3.org/2000/svg">
          <!-- black droplet body pointing down -->
          <path d="M21 4 C21 4 4 24 4 34 C4 44.5 11.5 52 21 52 C30.5 52 38 44.5 38 34 C38 24 21 4 21 4 Z"
                fill="#0f0f0f" stroke="#000" stroke-width="1"/>
          <!-- red inner -->
          <ellipse cx="21" cy="36" rx="9.5" ry="10.5" fill="#ef2222"/>
          <ellipse cx="18" cy="32" rx="3" ry="2.2" fill="#ff7a7a" opacity=".55"/>
        </svg>
      </div>
      <canvas id="wheel" class="block h-full w-full rounded-full"></canvas>
    </div>

    <!-- Spin -->
    <button
      id="btnSpin"
      type="button"
      class="spin-btn mt-10 inline-flex items-center justify-center gap-2 rounded-2xl bg-gradient-to-b from-blue-500 to-blue-700 px-14 py-4 text-xl font-extrabold uppercase tracking-wide text-white shadow-lg shadow-blue-500/30 ring-1 ring-blue-400/40 hover:from-blue-400 hover:to-blue-600 transition"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Spin
    </button>

    <!-- Result -->
    <div id="resultBox" class="mt-8 w-full max-w-md hidden">
      <div class="result-pop rounded-2xl border border-blue-100 bg-white px-6 py-5 text-center shadow-xl shadow-blue-500/10">
        <p class="text-xs font-bold uppercase tracking-[0.2em] text-blue-500">Kết quả</p>
        <p id="resultText" class="mt-1 text-3xl font-extrabold leading-tight text-slate-900 break-words"></p>
        <p class="mt-2 text-sm font-medium text-slate-500">Chúc vui vẻ 🍻</p>
      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" role="dialog" aria-modal="true">
    <div class="w-full max-w-md max-h-[90dvh] overflow-y-auto rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200">
      <div class="sticky top-0 flex items-center justify-between border-b border-slate-100 bg-white/95 px-5 py-4 backdrop-blur">
        <div>
          <h2 class="text-lg font-extrabold text-slate-900">Chỉnh sửa vòng quay</h2>
          <p class="text-xs font-medium text-slate-500" id="editTabLabel">Tab hiện tại</p>
        </div>
        <button id="btnCloseEdit" type="button" class="rounded-lg p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-700" aria-label="Đóng">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="space-y-5 px-5 py-5">
        <div>
          <label class="mb-2 block text-sm font-bold text-slate-700">Số ô (3 → 9)</label>
          <div class="flex flex-wrap gap-2" id="countPicker">
            <!-- 3..9 buttons -->
          </div>
        </div>

        <div>
          <label class="mb-2 block text-sm font-bold text-slate-700">Nội dung từng ô</label>
          <div class="space-y-2" id="segList"></div>
        </div>
      </div>

      <div class="sticky bottom-0 flex gap-2 border-t border-slate-100 bg-white px-5 py-4">
        <button id="btnCancelEdit" type="button" class="flex-1 rounded-xl border border-slate-200 bg-white py-3 text-sm font-bold text-slate-600 hover:bg-slate-50">
          Hủy
        </button>
        <button id="btnSaveEdit" type="button" class="flex-1 rounded-xl bg-blue-600 py-3 text-sm font-extrabold text-white shadow-md shadow-blue-500/25 hover:bg-blue-500">
          Lưu
        </button>
      </div>
    </div>
  </div>

  <script>
    // ─── Constants ───────────────────────────────────────────
    const STORAGE_KEY = 'luckydraw_v1';
    const COLORS = [
      '#2563EB', // xanh dương
      '#EF4444', // đỏ
      '#A855F7', // tím
      '#EAB308', // vàng
      '#22C55E', // xanh lá
      '#06B6D4', // lam (cyan)
      '#7C3AED', // tím đậm
    ];
    const TAB_IDS = ['an-nhau', 'custom1', 'custom2', 'custom3'];
    const TAB_LABELS = {
      'an-nhau': 'Ăn nhậu',
      'custom1': 'Custom 1',
      'custom2': 'Custom 2',
      'custom3': 'Custom 3',
    };
    const DEFAULT_AN_NHAU = [
      'Uống 1 ly',
      'Bên trái uống',
      'Bên phải uống',
      'Đối diện uống',
      'Chỉ 1 người uống',
      'Cùng cụng ly',
      'Miễn lượt',
      'Đồng khởi',
    ];
    const DEFAULT_CUSTOM = ['Mục 1', 'Mục 2', 'Mục 3', 'Mục 4'];

    // ─── State ───────────────────────────────────────────────
    let state = loadState();
    let rotation = 0;       // radians, current wheel rotation
    let spinning = false;
    let editDraft = null;   // { labels: string[] }

    // ─── DOM ─────────────────────────────────────────────────
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const tabBar = document.getElementById('tabBar');
    const btnSpin = document.getElementById('btnSpin');
    const btnEdit = document.getElementById('btnEdit');
    const resultBox = document.getElementById('resultBox');
    const resultText = document.getElementById('resultText');
    const editModal = document.getElementById('editModal');
    const editTabLabel = document.getElementById('editTabLabel');
    const countPicker = document.getElementById('countPicker');
    const segList = document.getElementById('segList');
    const btnCloseEdit = document.getElementById('btnCloseEdit');
    const btnCancelEdit = document.getElementById('btnCancelEdit');
    const btnSaveEdit = document.getElementById('btnSaveEdit');
    const wheelBox = document.getElementById('wheelBox');

    // ─── Persistence ─────────────────────────────────────────
    function defaultState() {
      return {
        activeTab: 'an-nhau',
        tabs: {
          'an-nhau': { labels: [...DEFAULT_AN_NHAU] },
          'custom1': { labels: [...DEFAULT_CUSTOM] },
          'custom2': { labels: [...DEFAULT_CUSTOM] },
          'custom3': { labels: [...DEFAULT_CUSTOM] },
        },
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        const base = defaultState();
        if (parsed.activeTab && base.tabs[parsed.activeTab]) {
          base.activeTab = parsed.activeTab;
        }
        if (parsed.tabs) {
          for (const id of TAB_IDS) {
            if (parsed.tabs[id]?.labels?.length) {
              const labels = parsed.tabs[id].labels
                .map((s) => String(s).trim())
                .filter(Boolean)
                .slice(0, 9);
              if (labels.length >= 3) base.tabs[id].labels = labels;
            }
          }
        }
        return base;
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function currentLabels() {
      return state.tabs[state.activeTab].labels;
    }

    // ─── Tabs UI ─────────────────────────────────────────────
    function renderTabs() {
      tabBar.innerHTML = '';
      for (const id of TAB_IDS) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.role = 'tab';
        btn.className =
          'tab-btn flex-1 whitespace-nowrap border-b-2 border-transparent px-3 py-3 text-sm font-bold text-slate-500 hover:text-slate-800 ' +
          (id === state.activeTab ? 'active' : '');
        btn.textContent = TAB_LABELS[id];
        btn.setAttribute('aria-selected', id === state.activeTab ? 'true' : 'false');
        btn.addEventListener('click', () => {
          if (spinning || id === state.activeTab) return;
          state.activeTab = id;
          saveState();
          rotation = 0;
          hideResult();
          renderTabs();
          drawWheel();
        });
        tabBar.appendChild(btn);
      }
    }

    // ─── Canvas wheel ────────────────────────────────────────
    function resizeCanvas() {
      const size = wheelBox.clientWidth;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(size * dpr);
      canvas.height = Math.round(size * dpr);
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawWheel();
    }

    function drawWheel() {
      const labels = currentLabels();
      const n = labels.length;
      const size = wheelBox.clientWidth;
      const cx = size / 2;
      const cy = size / 2;
      const radius = size / 2 - 4;
      const arc = (Math.PI * 2) / n;

      ctx.clearRect(0, 0, size, size);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      for (let i = 0; i < n; i++) {
        const start = i * arc - Math.PI / 2; // 0 at top
        const end = start + arc;
        const color = COLORS[i % COLORS.length];

        // slice
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        // subtle separator
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(start) * radius, Math.sin(start) * radius);
        ctx.stroke();

        // label
        const mid = start + arc / 2;
        ctx.save();
        ctx.rotate(mid);
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.shadowColor = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur = 3;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 1;

        const text = labels[i];
        const maxW = radius * 0.58;
        let fontSize = n <= 5 ? 16 : n <= 7 ? 14 : 12;
        ctx.font = `800 ${fontSize}px Barlow, system-ui, sans-serif`;
        // shrink if needed
        while (ctx.measureText(text).width > maxW && fontSize > 9) {
          fontSize -= 1;
          ctx.font = `800 ${fontSize}px Barlow, system-ui, sans-serif`;
        }
        // wrap long text into 2 lines if still too long
        if (ctx.measureText(text).width > maxW && text.includes(' ')) {
          const parts = splitLabel(text, ctx, maxW);
          const lineH = fontSize + 2;
          const startY = -((parts.length - 1) * lineH) / 2;
          parts.forEach((line, li) => {
            ctx.fillText(line, radius - 14, startY + li * lineH);
          });
        } else {
          ctx.fillText(text, radius - 14, 0);
        }
        ctx.restore();
      }

      // outer ring
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, radius + 1.5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(15,23,42,0.08)';
      ctx.lineWidth = 3;
      ctx.stroke();

      // center hub
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(14, size * 0.045), 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = 'rgba(15,23,42,0.12)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(6, size * 0.02), 0, Math.PI * 2);
      ctx.fillStyle = '#1e293b';
      ctx.fill();

      ctx.restore();
    }

    function splitLabel(text, measureCtx, maxW) {
      const words = text.split(/\s+/);
      if (words.length < 2) return [text];
      // try balanced 2 lines
      let best = [text];
      let bestScore = Infinity;
      for (let i = 1; i < words.length; i++) {
        const a = words.slice(0, i).join(' ');
        const b = words.slice(i).join(' ');
        const wa = measureCtx.measureText(a).width;
        const wb = measureCtx.measureText(b).width;
        const score = Math.max(wa, wb);
        if (score < bestScore && wa <= maxW * 1.05 && wb <= maxW * 1.05) {
          bestScore = score;
          best = [a, b];
        }
      }
      return best;
    }

    // ─── Spin logic ──────────────────────────────────────────
    // Pointer is at the TOP (angle -PI/2 in canvas space).
    // Segment i covers [i*arc - PI/2, (i+1)*arc - PI/2] in unrotated wheel.
    // With rotation R, a point at wheel-angle θ appears at θ + R on screen.
    // Pointer hits the wheel angle: -PI/2 - R  (mod 2π)
    function getWinnerIndex(rot) {
      const labels = currentLabels();
      const n = labels.length;
      const arc = (Math.PI * 2) / n;
      // Normalize rotation
      let r = ((rot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      // Angle on the wheel under the top pointer
      let wheelAngle = (-Math.PI / 2 - r + Math.PI * 2) % (Math.PI * 2);
      // Convert to segment index (segments start at -PI/2 in unrotated coords)
      // Unrotated segment i: from i*arc - PI/2
      // wheelAngle relative to top (0 at top going clockwise in our draw which is CCW positive...)
      // Our segments: start_i = i * arc - PI/2
      // A point at absolute angle α (standard math) belongs to segment where:
      //   α' = (α + PI/2 + 2π) % 2π  → index = floor(α' / arc)
      // But after rotation, screen top (-PI/2) maps to wheel angle α = -PI/2 - r
      let a = (-Math.PI / 2 - r);
      let normalized = ((a + Math.PI / 2) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      // Our drawing goes CCW from top; index increases CCW.
      // Pointer fixed at top: as wheel rotates positively (CCW), content moves CCW,
      // so winner index decreases... let's verify:
      // At rot=0, top is middle of... start of seg 0 is at top (-PI/2), so top edge is start of seg 0.
      // Center of seg 0 is at mid of arc from top. Top pointer at boundary.
      // Better: use center-based with small epsilon toward clockwise for boundary.
      let idx = Math.floor(normalized / arc) % n;
      return idx;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function spin() {
      if (spinning) return;
      const labels = currentLabels();
      if (!labels.length) return;

      hideResult();
      spinning = true;
      btnSpin.disabled = true;

      const n = labels.length;
      // True random winner
      const targetIndex = Math.floor(Math.random() * n);
      const arc = (Math.PI * 2) / n;
      // We want segment targetIndex centered under the top pointer at the end.
      // Center of segment i (unrotated) is at angle: i*arc - PI/2 + arc/2
      // After rotation R, that center is at: i*arc - PI/2 + arc/2 + R
      // We want that equal to -PI/2 (top):
      //   i*arc + arc/2 + R ≡ 0  (mod 2π)
      //   R ≡ -i*arc - arc/2  (mod 2π)
      const targetRotMod = (-targetIndex * arc - arc / 2 + Math.PI * 2 * 10) % (Math.PI * 2);

      // Add multiple full spins for drama
      const extraSpins = 4 + Math.floor(Math.random() * 3); // 4–6
      const startRot = rotation;
      // Find end rotation: continue forward (positive = CCW) past start
      let delta = targetRotMod - (startRot % (Math.PI * 2));
      delta = ((delta % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      // Prefer going further: add extra full turns
      // Actually targetRotMod is absolute mod; we need absolute end:
      // end = start + positive amount that lands on targetRotMod
      let endRot = startRot + delta + extraSpins * Math.PI * 2;
      // If delta is tiny, still spin plenty
      if (endRot - startRot < extraSpins * Math.PI * 2) {
        endRot = startRot + extraSpins * Math.PI * 2 + delta;
      }

      const duration = 4200 + Math.random() * 800; // ~4.2–5s
      const t0 = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - t0) / duration);
        const e = easeOutCubic(t);
        rotation = startRot + (endRot - startRot) * e;
        drawWheel();
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = endRot;
          drawWheel();
          // Verify winner (should match targetIndex; recompute for safety)
          const winner = getWinnerIndex(rotation);
          showResult(labels[winner] ?? labels[targetIndex]);
          spinning = false;
          btnSpin.disabled = false;
        }
      }
      requestAnimationFrame(frame);
    }

    function showResult(text) {
      resultText.textContent = text;
      resultBox.classList.remove('hidden');
      // restart animation
      const inner = resultBox.firstElementChild;
      inner.classList.remove('result-pop');
      void inner.offsetWidth;
      inner.classList.add('result-pop');
    }

    function hideResult() {
      resultBox.classList.add('hidden');
    }

    // ─── Edit modal ──────────────────────────────────────────
    function openEdit() {
      if (spinning) return;
      editDraft = { labels: [...currentLabels()] };
      editTabLabel.textContent = 'Tab: ' + TAB_LABELS[state.activeTab];
      renderCountPicker();
      renderSegList();
      editModal.classList.remove('hidden');
      editModal.classList.add('flex');
    }

    function closeEdit() {
      editModal.classList.add('hidden');
      editModal.classList.remove('flex');
      editDraft = null;
    }

    function renderCountPicker() {
      countPicker.innerHTML = '';
      for (let c = 3; c <= 9; c++) {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = String(c);
        const active = editDraft.labels.length === c;
        b.className =
          'h-10 w-10 rounded-xl text-sm font-extrabold transition ' +
          (active
            ? 'bg-blue-600 text-white shadow-md shadow-blue-500/30'
            : 'border border-slate-200 bg-white text-slate-600 hover:bg-slate-50');
        b.addEventListener('click', () => {
          // Read current inputs first
          syncDraftFromInputs();
          const cur = editDraft.labels;
          if (c > cur.length) {
            while (editDraft.labels.length < c) {
              editDraft.labels.push('Mục ' + (editDraft.labels.length + 1));
            }
          } else if (c < cur.length) {
            editDraft.labels = cur.slice(0, c);
          }
          renderCountPicker();
          renderSegList();
        });
        countPicker.appendChild(b);
      }
    }

    function renderSegList() {
      segList.innerHTML = '';
      editDraft.labels.forEach((label, i) => {
        const row = document.createElement('div');
        row.className = 'seg-row flex items-center gap-2';
        const swatch = document.createElement('span');
        swatch.className = 'h-8 w-8 shrink-0 rounded-lg ring-1 ring-black/5';
        swatch.style.background = COLORS[i % COLORS.length];
        const input = document.createElement('input');
        input.type = 'text';
        input.value = label;
        input.maxLength = 40;
        input.dataset.idx = String(i);
        input.className =
          'w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-800';
        input.placeholder = 'Ô ' + (i + 1);
        const num = document.createElement('span');
        num.className = 'w-5 text-center text-xs font-bold text-slate-400';
        num.textContent = String(i + 1);
        row.appendChild(num);
        row.appendChild(swatch);
        row.appendChild(input);
        segList.appendChild(row);
      });
    }

    function syncDraftFromInputs() {
      if (!editDraft) return;
      const inputs = segList.querySelectorAll('input');
      inputs.forEach((inp) => {
        const i = Number(inp.dataset.idx);
        editDraft.labels[i] = inp.value.trim() || ('Mục ' + (i + 1));
      });
    }

    function saveEdit() {
      syncDraftFromInputs();
      let labels = editDraft.labels.map((s) => s.trim()).filter(Boolean);
      if (labels.length < 3) {
        alert('Cần ít nhất 3 ô có nội dung.');
        return;
      }
      if (labels.length > 9) labels = labels.slice(0, 9);
      state.tabs[state.activeTab].labels = labels;
      saveState();
      closeEdit();
      rotation = 0;
      hideResult();
      drawWheel();
    }

    // ─── Events ──────────────────────────────────────────────
    btnSpin.addEventListener('click', spin);
    btnEdit.addEventListener('click', openEdit);
    btnCloseEdit.addEventListener('click', closeEdit);
    btnCancelEdit.addEventListener('click', closeEdit);
    btnSaveEdit.addEventListener('click', saveEdit);
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) closeEdit();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !editModal.classList.contains('hidden')) closeEdit();
    });
    window.addEventListener('resize', () => {
      resizeCanvas();
    });

    // ─── Init ────────────────────────────────────────────────
    renderTabs();
    resizeCanvas();
  </script>
</body>
</html>
