<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>LuckyDraw</title>
  <meta name="description" content="LuckyDraw — vòng quay may rủi" />
  <meta name="theme-color" content="#000000" />
  <meta name="application-name" content="LuckyDraw" />
  <link rel="icon" href="spin.png?v=8" type="image/png" sizes="any" />
  <link rel="icon" href="spin.png?v=8" type="image/png" sizes="32x32" />
  <link rel="icon" href="spin.png?v=8" type="image/png" sizes="192x192" />
  <link rel="shortcut icon" href="spin.png?v=8" type="image/png" />
  <link rel="apple-touch-icon" href="spin.png?v=8" sizes="180x180" />
  <link rel="apple-touch-icon" href="spin.png?v=8" sizes="512x512" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LuckyDraw" />
  <link rel="manifest" href="manifest.webmanifest?v=8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Flat luxury — match spin.png: pure black, solid fills, pink accent, no glow */
    :root {
      --bg: #000000;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --line: #2a2a2a;
      --primary: #ff2d95;
      --primary-press: #e02684;
      --text: #ffffff;
      --text-muted: #8a8a8a;
      --text-dim: #5c5c5c;
      --font: 'Inter', system-ui, -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif;
      --r-btn: 14px;
      --r-card: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: #050505;
      color: var(--text);
    }

    /*
      10 hàng dọc bằng nhau (1fr × 10) — KHÔNG phá bố cục này:
      1 top/Edit · 2 trống · 3–7 vòng xoay · 8–9 Spin · 10 navbar
      Desktop: khóa mobile frame max 430px, không tràn full màn.
    */
    .app {
      width: 100%;
      max-width: 430px;
      height: 100%;
      height: 100dvh;
      min-height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: repeat(10, minmax(0, 1fr));
      grid-template-columns: minmax(0, 1fr);
      overflow: hidden;
      background: var(--bg);
      padding-top: env(safe-area-inset-top, 0px);
      position: relative;
    }

    @media (min-width: 431px) {
      .app {
        border-left: 1px solid var(--line);
        border-right: 1px solid var(--line);
      }
    }

    /* Hàng 1 — chỉ nút Edit */
    .top-bar {
      grid-row: 1 / 2;
      align-self: stretch;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px;
      overflow: hidden;
      z-index: 5;
    }

    .edit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: var(--primary);
      border-radius: 999px;
      padding: 9px 20px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .12s, transform .12s;
    }
    .edit-btn:active {
      transform: scale(0.97);
      background: var(--primary-press);
    }

    /* Hàng 3–7 — vòng xoay */
    .wheel-zone {
      grid-row: 3 / 8;
      align-self: stretch;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      position: relative;
      overflow: visible;
      padding-top: 5dvh;
      box-sizing: border-box;
    }

    .wheel-wrap {
      position: relative;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1;
      margin: 0 auto;
      flex-shrink: 1;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      z-index: 1;
    }
    .wheel-wrap.spinning { cursor: wait; }
    .wheel-wrap:active:not(.spinning) { transform: scale(0.985); }

    #wheel {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: transparent;
    }

    /* Tam giác trắng, tip vào tâm — sát mép trái bánh */
    .pointer {
      position: absolute;
      left: 0;
      top: 50%;
      width: 24px;
      height: 30px;
      z-index: 20;
      pointer-events: none;
      transform: translate(-3px, -50%);
    }
    @media (min-width: 400px) {
      .pointer { width: 27px; height: 33px; }
    }

    /* Hàng 8–9 — Spin */
    .spin-zone {
      grid-row: 8 / 10;
      align-self: stretch;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      overflow: visible;
      background: transparent;
      position: relative;
      z-index: 2;
    }

    .spin-btn {
      width: min(72%, 280px);
      height: min(56px, 70%);
      min-height: 48px;
      max-height: 64px;
      flex-shrink: 0;
      border: none;
      border-radius: var(--r-btn);
      font-family: inherit;
      font-weight: 800;
      font-size: clamp(1.05rem, 4.2vw, 1.3rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: transform .12s, opacity .15s, background .12s;
    }
    .spin-btn:active:not(:disabled) {
      transform: scale(0.97);
      background: var(--primary-press);
    }
    .spin-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Hàng 10 — navbar */
    .tab-bar {
      grid-row: 10 / 11;
      align-self: stretch;
      justify-self: stretch;
      width: 100%;
      height: 100%;
      min-height: 0;
      max-height: none;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
      background: var(--bg);
      border-top: 1px solid var(--line);
      padding: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      margin: 0;
      box-sizing: border-box;
      position: relative;
      z-index: 6;
    }

    .tab-btn {
      flex: 1 1 0;
      height: auto;
      align-self: stretch;
      min-width: 0;
      min-height: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      font-family: inherit;
      font-weight: 600;
      font-size: clamp(0.7rem, 2.8vw, 0.85rem);
      color: var(--text-dim);
      cursor: pointer;
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      touch-action: manipulation;
      transition: color .12s;
    }
    .tab-btn.active {
      color: var(--primary);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      border-radius: 1px;
      background: var(--primary);
    }

    /* ── Modals ── */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.78);
    }

    .result-modal {
      animation: fadeIn .2s ease both;
    }
    .result-card {
      animation: popIn .35s cubic-bezier(.2, 1.1, .4, 1) both;
      width: min(92vw, 400px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-card);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    .result-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--primary);
    }
    .result-text {
      margin-top: 1rem;
      font-size: clamp(1.75rem, 7vw, 2.25rem);
      font-weight: 800;
      line-height: 1.15;
      color: var(--text);
      word-break: break-word;
      padding: 0 4px;
    }
    .result-sub {
      margin-top: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .btn-ok {
      margin-top: 1.75rem;
      width: 100%;
      border: none;
      border-radius: var(--r-btn);
      padding: 14px 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      touch-action: manipulation;
      transition: background .12s, transform .12s;
    }
    .btn-ok:active {
      transform: scale(0.98);
      background: var(--primary-press);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.94) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Edit modal */
    .edit-sheet {
      width: 100%;
      max-width: 28rem;
      max-height: 90dvh;
      overflow-y: auto;
      border-radius: var(--r-card);
      background: var(--surface);
      border: 1px solid var(--line);
    }
    .edit-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .edit-header h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .edit-header p {
      margin: 4px 0 0;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .btn-ghost {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-ghost:active { background: var(--surface-2); color: var(--text); }

    .edit-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .field-label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .count-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .count-btn {
      height: 40px;
      width: 40px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .12s, color .12s, border-color .12s;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text-muted);
    }
    .count-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .seg-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .seg-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .seg-num {
      width: 20px;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
    }
    .seg-swatch {
      height: 28px;
      width: 28px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .seg-input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--bg);
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
    }
    .seg-input:focus {
      border-color: var(--primary);
    }
    .seg-input::placeholder { color: var(--text-dim); }

    .edit-footer {
      position: sticky;
      bottom: 0;
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid var(--line);
      background: var(--surface);
    }
    .btn-cancel {
      flex: 1;
      border-radius: var(--r-btn);
      border: 1px solid var(--line);
      background: transparent;
      padding: 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
    }
    .btn-save {
      flex: 1;
      border-radius: var(--r-btn);
      border: none;
      background: var(--primary);
      padding: 12px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }
    .btn-cancel:active, .btn-save:active { transform: scale(0.98); }
    .btn-save:active { background: var(--primary-press); }

    .hidden { display: none !important; }
    .flex { display: flex !important; }
    .fixed { position: fixed; }
    .inset-0 { inset: 0; }
    .z-50 { z-index: 50; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .p-4 { padding: 1rem; }
    .p-5 { padding: 1.25rem; }
  </style>
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <button id="btnEdit" type="button" class="edit-btn" title="Chỉnh sửa vòng quay">Edit</button>
    </header>

    <section class="wheel-zone">
      <div class="wheel-wrap" id="wheelBox" role="button" tabindex="0" aria-label="Chạm để quay">
        <div class="pointer" aria-hidden="true">
          <!-- Tam giác trắng, tip phải (vào tâm) -->
          <svg viewBox="0 0 16 20" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <polygon points="0,0 16,10 0,20" fill="#ffffff"/>
          </svg>
        </div>
        <canvas id="wheel"></canvas>
      </div>
    </section>

    <div class="spin-zone">
      <button id="btnSpin" type="button" class="spin-btn">SPIN</button>
    </div>

    <nav class="tab-bar" id="tabBar" role="tablist" aria-label="Chế độ vòng quay"></nav>
  </div>

  <!-- Result modal -->
  <div id="resultModal" class="result-modal fixed inset-0 z-50 hidden items-center justify-center p-5 modal-backdrop" role="dialog" aria-modal="true">
    <div class="result-card">
      <p class="result-label">Kết quả</p>
      <p id="resultText" class="result-text"></p>
      <p class="result-sub">1 2 3 dzô</p>
      <button id="btnCloseResult" type="button" class="btn-ok">OK</button>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" role="dialog" aria-modal="true">
    <div class="edit-sheet">
      <div class="edit-header">
        <div>
          <h2>Chỉnh sửa vòng quay</h2>
          <p id="editTabLabel">Tab hiện tại</p>
        </div>
        <button id="btnCloseEdit" type="button" class="btn-ghost" aria-label="Đóng">Đóng</button>
      </div>

      <div class="edit-body">
        <div>
          <label class="field-label">Số ô (3 → 9)</label>
          <div class="count-picker" id="countPicker"></div>
        </div>
        <div>
          <label class="field-label">Nội dung từng ô</label>
          <div class="seg-list" id="segList"></div>
        </div>
      </div>

      <div class="edit-footer">
        <button id="btnCancelEdit" type="button" class="btn-cancel">Hủy</button>
        <button id="btnSaveEdit" type="button" class="btn-save">Lưu</button>
      </div>
    </div>
  </div>

  <script>
    // ─── Constants ───────────────────────────────────────────
    const STORAGE_KEY = 'luckydraw_v3';
    // Flat palette khớp spin.png (+ màu solid thêm khi >5 ô) — không neon
    const COLORS = [
      '#FF3B30', // red
      '#34C759', // green
      '#AF52DE', // purple
      '#FFD60A', // yellow
      '#007AFF', // blue
      '#FF9500', // orange
      '#FF2D95', // pink (brand)
      '#5AC8FA', // light blue
      '#8E8E93', // neutral gray (9th)
    ];

    function colorsForCount(n) {
      const base = COLORS.slice(0, Math.min(n, COLORS.length));
      if (n <= COLORS.length) {
        if (n > 2 && base[0] === base[n - 1]) {
          const mid = base.splice(1, 1)[0];
          base.push(mid);
        }
        return base;
      }
      return Array.from({ length: n }, (_, i) => COLORS[i % COLORS.length]);
    }

    // Pointer tip on rim: left-center = 180° (π) — chữ thắng đọc ngang rim→tâm
    const POINTER_ANGLE = Math.PI;

    const TAB_IDS = ['an-nhau', 'custom1', 'custom2', 'custom3'];
    const TAB_LABELS = {
      'an-nhau': 'Ăn nhậu',
      'custom1': 'Custom 1',
      'custom2': 'Custom 2',
      'custom3': 'Custom 3',
    };
    const DEFAULT_AN_NHAU = [
      'Uống 1 ly',
      'Bên trái uống',
      'Bên phải uống',
      'Đối diện uống',
      'Chọn 1 người uống cùng',
      'Miễn lượt',
      'Đồng khởi',
    ];
    const DEFAULT_CUSTOM = ['Mục 1', 'Mục 2', 'Mục 3', 'Mục 4'];

    // ─── State ───────────────────────────────────────────────
    let state = loadState();
    let rotation = 0;
    let spinning = false;
    let editDraft = null;

    // ─── DOM ─────────────────────────────────────────────────
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const tabBar = document.getElementById('tabBar');
    const btnSpin = document.getElementById('btnSpin');
    const btnEdit = document.getElementById('btnEdit');
    const resultModal = document.getElementById('resultModal');
    const resultText = document.getElementById('resultText');
    const btnCloseResult = document.getElementById('btnCloseResult');
    const editModal = document.getElementById('editModal');
    const editTabLabel = document.getElementById('editTabLabel');
    const countPicker = document.getElementById('countPicker');
    const segList = document.getElementById('segList');
    const btnCloseEdit = document.getElementById('btnCloseEdit');
    const btnCancelEdit = document.getElementById('btnCancelEdit');
    const btnSaveEdit = document.getElementById('btnSaveEdit');
    const wheelBox = document.getElementById('wheelBox');

    // ─── Persistence ─────────────────────────────────────────
    function defaultState() {
      return {
        activeTab: 'an-nhau',
        tabs: {
          'an-nhau': { labels: [...DEFAULT_AN_NHAU] },
          'custom1': { labels: [...DEFAULT_CUSTOM] },
          'custom2': { labels: [...DEFAULT_CUSTOM] },
          'custom3': { labels: [...DEFAULT_CUSTOM] },
        },
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        const base = defaultState();
        if (parsed.activeTab && base.tabs[parsed.activeTab]) {
          base.activeTab = parsed.activeTab;
        }
        if (parsed.tabs) {
          for (const id of TAB_IDS) {
            if (parsed.tabs[id]?.labels?.length) {
              const labels = parsed.tabs[id].labels
                .map((s) => String(s).trim())
                .filter(Boolean)
                .slice(0, 9);
              if (labels.length >= 3) base.tabs[id].labels = labels;
            }
          }
        }
        return base;
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function currentLabels() {
      return state.tabs[state.activeTab].labels;
    }

    // ─── Tabs UI ─────────────────────────────────────────────
    function renderTabs() {
      tabBar.innerHTML = '';
      for (const id of TAB_IDS) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.role = 'tab';
        btn.className = 'tab-btn' + (id === state.activeTab ? ' active' : '');
        btn.textContent = TAB_LABELS[id];
        btn.setAttribute('aria-selected', id === state.activeTab ? 'true' : 'false');
        btn.addEventListener('click', () => {
          if (spinning || id === state.activeTab) return;
          state.activeTab = id;
          saveState();
          rotation = 0;
          hideResult();
          renderTabs();
          drawWheel();
        });
        tabBar.appendChild(btn);
      }
    }

    // ─── Canvas wheel ────────────────────────────────────────
    function resizeCanvas() {
      const parent = wheelBox.parentElement;
      let size = 0;
      if (parent) {
        // Pointer sát mép — bánh chiếm gần hết zone
        const pw = parent.clientWidth - 12;
        const ph = parent.clientHeight - 4;
        size = Math.max(0, Math.floor(Math.min(pw, ph) * 0.9));
        if (size > 0) {
          wheelBox.style.width = size + 'px';
          wheelBox.style.height = size + 'px';
        }
      }
      if (!size) return;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(size * dpr);
      canvas.height = Math.round(size * dpr);
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawWheel();
    }

    function drawWheel() {
      const labels = currentLabels();
      const n = labels.length;
      const size = wheelBox.clientWidth;
      if (!size) return;
      const cx = size / 2;
      const cy = size / 2;
      const radius = size / 2 - 1;
      const arc = (Math.PI * 2) / n;
      const palette = colorsForCount(n);
      const hub = Math.max(8, size * 0.032);
      // Stroke cố định theo CSS px — đều mọi hướng, không phình theo anti-alias
      const dividerW = Math.max(2, size * 0.008);

      ctx.clearRect(0, 0, size, size);

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      // 1) Fill ô
      for (let i = 0; i < n; i++) {
        const start = i * arc - Math.PI / 2;
        const end = start + arc;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = palette[i];
        ctx.fill();
      }

      // 2) Divider — vẽ 1 lượt, cùng lineWidth, từ mép hub → rim (tránh chồng ở tâm)
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = dividerW;
      ctx.lineCap = 'butt';
      ctx.lineJoin = 'miter';
      for (let i = 0; i < n; i++) {
        const a = i * arc - Math.PI / 2;
        const cos = Math.cos(a);
        const sin = Math.sin(a);
        ctx.beginPath();
        ctx.moveTo(cos * hub, sin * hub);
        ctx.lineTo(cos * radius, sin * radius);
        ctx.stroke();
      }

      // 3) Chữ trắng + stroke đen mỏng (đọc được trên mọi màu ô)
      for (let i = 0; i < n; i++) {
        const start = i * arc - Math.PI / 2;
        const mid = start + arc / 2;
        ctx.save();
        ctx.rotate(mid + Math.PI);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = 'rgba(0,0,0,0.55)';
        ctx.lineWidth = Math.max(2, size * 0.006);
        ctx.lineJoin = 'round';
        ctx.miterLimit = 2;

        const text = labels[i];
        const maxW = radius * 0.56;
        const textX = -(radius - 14);
        let fontSize = n <= 5 ? 15 : n <= 7 ? 13 : 11;
        ctx.font = `700 ${fontSize}px Inter, system-ui, sans-serif`;
        while (ctx.measureText(text).width > maxW && fontSize > 9) {
          fontSize -= 1;
          ctx.font = `700 ${fontSize}px Inter, system-ui, sans-serif`;
        }

        function paintLine(line, x, y) {
          ctx.strokeText(line, x, y);
          ctx.fillText(line, x, y);
        }

        if (ctx.measureText(text).width > maxW && text.includes(' ')) {
          const parts = splitLabel(text, ctx, maxW);
          const lineH = fontSize + 2;
          const startY = -((parts.length - 1) * lineH) / 2;
          parts.forEach((line, li) => {
            paintLine(line, textX, startY + li * lineH);
          });
        } else {
          paintLine(text, textX, 0);
        }
        ctx.restore();
      }

      // 4) Hub trắng (cùng màu pointer)
      ctx.beginPath();
      ctx.arc(0, 0, hub, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();

      ctx.restore();
    }

    function splitLabel(text, measureCtx, maxW) {
      const words = text.split(/\s+/);
      if (words.length < 2) return [text];
      let best = [text];
      let bestScore = Infinity;
      for (let i = 1; i < words.length; i++) {
        const a = words.slice(0, i).join(' ');
        const b = words.slice(i).join(' ');
        const wa = measureCtx.measureText(a).width;
        const wb = measureCtx.measureText(b).width;
        const score = Math.max(wa, wb);
        if (score < bestScore && wa <= maxW * 1.05 && wb <= maxW * 1.05) {
          bestScore = score;
          best = [a, b];
        }
      }
      return best;
    }

    // ─── Spin logic ──────────────────────────────────────────
    function getWinnerIndex(rot) {
      const n = currentLabels().length;
      const arc = (Math.PI * 2) / n;
      const r = ((rot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      let a = POINTER_ANGLE - r;
      let normalized = ((a + Math.PI / 2) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      return Math.floor(normalized / arc) % n;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function setSpinLabel(spinningNow) {
      btnSpin.textContent = spinningNow ? 'Đang quay...' : 'SPIN';
    }

    function spin() {
      if (spinning) return;
      const labels = currentLabels();
      if (!labels.length) return;

      hideResult();
      spinning = true;
      btnSpin.disabled = true;
      setSpinLabel(true);
      wheelBox.classList.add('spinning');

      const n = labels.length;
      const targetIndex = Math.floor(Math.random() * n);
      const arc = (Math.PI * 2) / n;

      const targetRotMod =
        ((POINTER_ANGLE + Math.PI / 2 - targetIndex * arc - arc / 2) % (Math.PI * 2) + Math.PI * 2) %
        (Math.PI * 2);

      // 5–6 full spins, ~4.5–5s
      const extraSpins = 5 + Math.floor(Math.random() * 2);
      const startRot = rotation;
      let delta = targetRotMod - (((startRot % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2));
      delta = ((delta % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const endRot = startRot + delta + extraSpins * Math.PI * 2;

      const duration = 4500 + Math.random() * 500;
      const t0 = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - t0) / duration);
        rotation = startRot + (endRot - startRot) * easeOutCubic(t);
        drawWheel();
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = endRot;
          drawWheel();
          const winner = getWinnerIndex(rotation);
          showResult(labels[winner] ?? labels[targetIndex]);
          spinning = false;
          btnSpin.disabled = false;
          setSpinLabel(false);
          wheelBox.classList.remove('spinning');
        }
      }
      requestAnimationFrame(frame);
    }

    function showResult(text) {
      resultText.textContent = text;
      resultModal.classList.remove('hidden');
      resultModal.classList.add('flex');
      const card = resultModal.querySelector('.result-card');
      card.style.animation = 'none';
      void card.offsetWidth;
      card.style.animation = '';
    }

    function hideResult() {
      resultModal.classList.add('hidden');
      resultModal.classList.remove('flex');
    }

    // ─── Edit modal ──────────────────────────────────────────
    function openEdit() {
      if (spinning) return;
      editDraft = { labels: [...currentLabels()] };
      editTabLabel.textContent = 'Tab: ' + TAB_LABELS[state.activeTab];
      renderCountPicker();
      renderSegList();
      editModal.classList.remove('hidden');
      editModal.classList.add('flex');
    }

    function closeEdit() {
      editModal.classList.add('hidden');
      editModal.classList.remove('flex');
      editDraft = null;
    }

    function renderCountPicker() {
      countPicker.innerHTML = '';
      for (let c = 3; c <= 9; c++) {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = String(c);
        const active = editDraft.labels.length === c;
        b.className = 'count-btn' + (active ? ' active' : '');
        b.addEventListener('click', () => {
          syncDraftFromInputs();
          const cur = editDraft.labels;
          if (c > cur.length) {
            while (editDraft.labels.length < c) {
              editDraft.labels.push('Mục ' + (editDraft.labels.length + 1));
            }
          } else if (c < cur.length) {
            editDraft.labels = cur.slice(0, c);
          }
          renderCountPicker();
          renderSegList();
        });
        countPicker.appendChild(b);
      }
    }

    function renderSegList() {
      segList.innerHTML = '';
      editDraft.labels.forEach((label, i) => {
        const row = document.createElement('div');
        row.className = 'seg-row';

        const num = document.createElement('span');
        num.className = 'seg-num';
        num.textContent = String(i + 1);

        const color = colorsForCount(editDraft.labels.length)[i];
        const swatch = document.createElement('span');
        swatch.className = 'seg-swatch';
        swatch.style.background = color;
        swatch.style.color = color;

        const input = document.createElement('input');
        input.type = 'text';
        input.value = label;
        input.maxLength = 40;
        input.dataset.idx = String(i);
        input.className = 'seg-input';
        input.placeholder = 'Ô ' + (i + 1);

        row.appendChild(num);
        row.appendChild(swatch);
        row.appendChild(input);
        segList.appendChild(row);
      });
    }

    function syncDraftFromInputs() {
      if (!editDraft) return;
      segList.querySelectorAll('input').forEach((inp) => {
        const i = Number(inp.dataset.idx);
        editDraft.labels[i] = inp.value.trim() || ('Mục ' + (i + 1));
      });
    }

    function saveEdit() {
      syncDraftFromInputs();
      let labels = editDraft.labels.map((s) => s.trim()).filter(Boolean);
      if (labels.length < 3) {
        alert('Cần ít nhất 3 ô có nội dung.');
        return;
      }
      if (labels.length > 9) labels = labels.slice(0, 9);
      state.tabs[state.activeTab].labels = labels;
      saveState();
      closeEdit();
      rotation = 0;
      hideResult();
      drawWheel();
    }

    // ─── Events ──────────────────────────────────────────────
    btnSpin.addEventListener('click', spin);
    wheelBox.addEventListener('click', spin);
    wheelBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        spin();
      }
    });
    btnEdit.addEventListener('click', openEdit);
    btnCloseEdit.addEventListener('click', closeEdit);
    btnCancelEdit.addEventListener('click', closeEdit);
    btnSaveEdit.addEventListener('click', saveEdit);
    btnCloseResult.addEventListener('click', hideResult);
    resultModal.addEventListener('click', (e) => {
      if (e.target === resultModal) hideResult();
    });
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) closeEdit();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (!editModal.classList.contains('hidden')) closeEdit();
      else if (!resultModal.classList.contains('hidden')) hideResult();
    });
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 120));

    // ─── Init ────────────────────────────────────────────────
    renderTabs();
    requestAnimationFrame(() => {
      resizeCanvas();
      requestAnimationFrame(resizeCanvas);
    });
  </script>
</body>
</html>
